<form id="createCustomer">
<div>
    <select id="title" name="title" style="vertical-align: bottom;" class="select">
        <option value="" selected="">Select...</option>
        <option value="Mr">Mr</option>
        <option value="Mr &amp; Mrs">Mr &amp; Mrs</option>
        <option value="Baroness">Baroness</option>
        <option value="Baron">Baron</option>
        <option value="Lord">Lord</option>
        <option value="Lady">Lady</option>
        <option value="Sir">Sir</option>
        <option value="General">General</option>
        <option value="Captain">Captain</option>
        <option value="Mrs">Mrs</option>
        <option value="Miss">Miss</option>
        <option value="Ms">Ms</option>
        <option value="Doctor">Doctor</option>
        <option value="Professor">Professor</option>
        <option value="Reverend">Reverend</option>
        <option value="Sister">Sister</option>
    </select>
</div> 

<div>
    <input class="input" id="firstName" name="firstName" type="text" value="" placeholder="First">
    <input class="input" id="lastName" name="lastName" type="text" value="" placeholder="Last">
</div> 

<div>
    <input class="input" id="mobileNumber" name="mobileNumber" type="text" value="">
    <label><span>Mobile Number</span></label>
</div> 

<div>
    <input name="email" type="email" value="">
    <label><span>Email</span></label>
</div> 

<div>
  <label><span>Customer Address</span> <span class="kn-required">*</span></label>
  <div class="dropdown">
    <input id="street" name="street" type="text" value="" style="display: inline-flex;" placeholder="Type here" data-bs-toggle="dropdown">
    <ul class="dropdown-menu" aria-labelledby="street">
      <li><a class="dropdown-item" href="#">Item 1</a></li>
      <li><a class="dropdown-item" href="#">Item 2</a></li>
      <li><a class="dropdown-item" href="#">Item 3</a></li>
    </ul>
    <label>Address</label>
  </div>
  <div class="control">
    <input class="input" id="street2" name="street2" type="text" value="">
    <label>Address 2</label>
  </div>
  <div class="control">
    <input class="input" id="city" name="city" type="text" value="">
    <label>City</label>
  </div>
  <div class="control">
    <input class="input" id="zip" name="zip" type="text" value="">
    <label>Postal Code</label>
  </div>
</div> 
<div>
    <input class="form-check-input" type="checkbox" value="" name="gdprEmail" id="gdprEmail">Email
    <input class="form-check-input" type="checkbox" value="" name="gdprSMS" id="gdprSMS">SMS
    <input class="form-check-input" type="checkbox" value="" name="gdprPhone" id="gdprPhone">Phone
</div> 
<button type="submit">Create in Autoline</button>
</form>
